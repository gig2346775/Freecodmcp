<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="geometricPrecision">

  <!-- Dark background tile -->
  <rect width="32" height="32" rx="5" fill="#0d0d0d"/>

  <!-- Gold gradient shared by both pillars -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#E2C97E"/>
      <stop offset="100%" stop-color="#8C6A20"/>
    </linearGradient>
  </defs>

  <!-- Left pillar  — outer-left straight, inner-bottom angles to centre point -->
  <polygon
    points="3,3 12.5,3 16,25.5 3,28.5"
    fill="url(#g)"
  />

  <!-- Right pillar — mirror of left -->
  <polygon
    points="19.5,3 29,3 29,28.5 16,25.5"
    fill="url(#g)"
  />

</svg>
